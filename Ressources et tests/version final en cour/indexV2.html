<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte avec Leaflet et OSRM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-search/dist/leaflet-search.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search/dist/leaflet-search.min.css" />
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        var map = L.map('map').setView([45.937486634251044, 6.132610739228446], 18);

        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        var startPoint = null;
        var startMarker = null;
        var endPoint = null;
        var endMarker = null;

        // Couches GeoJSON pour les étages
        var layerEtage0 = L.geoJSON(null, { style: { color: "red", weight: 4 } });
        var layerEtage1 = L.geoJSON(null, { style: { color: "blue", weight: 4 } });

        // Nouveaux GeoJSON pour les chemins des étages
        var cheminetage0 = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.126, 45.9374], [6.1330, 45.9378]] },
                    "properties": { "name": "salle_115" }
                },
                { "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.136, 45.93674], [6.13380, 45.937]] },
                    "properties": { "name": "salle_116" }
                },
            ]
        };

        var cheminetage1 = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.1327, 45.936], [6.1332, 45.9379]] },
                    "properties": { "name": "salle_116" }
                }
            ]
        };

        // GeoJSON existant pour les salles
        var sallesGeoJsonEtage0 = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.1326, 45.9374], [6.1330, 45.9378]] },
                    "properties": { "name": "salle_115" }
                },
                {
                    "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.1325, 45.9375], [6.1331, 45.9380]] },
                    "properties": { "name": "salle_116" }
                },
            ]
        };

        // Nouveau GeoJSON pour les salles de l'étage 1
        var sallesGeoJsonEtage1 = {
            "type": "FeatureCollection",
            "features": [
                { "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.1327, 45.9376], [6.1332, 45.9379]] },
                    "properties": { "name": "salle_215" }
                },
                {
                    "type": "Feature",
                    "geometry": { "type": "LineString", "coordinates": [[6.1328, 45.9377], [6.1333, 45.9381]] },
                    "properties": { "name": "salle_216" }
                },
            ]
        };

        // Création des groupes pour chaque étage
        var sallesLayerEtage0 = L.geoJSON(sallesGeoJsonEtage0, {
            onEachFeature: function (feature, layer) {
                layer.bindPopup(feature.properties.name);
            }
        });

        var sallesLayerEtage1 = L.geoJSON(sallesGeoJsonEtage1, {
            onEachFeature: function (feature, layer) {
                layer.bindPopup(feature.properties.name);
            }
        });

        var cheminLayerEtage0 = L.geoJSON(cheminetage0, {
            onEachFeature: function (feature, layer) {
                layer.bindPopup(feature.properties.name);
            }
        });

        var cheminLayerEtage1 = L.geoJSON(cheminetage1, {
            onEachFeature: function (feature, layer) {
                layer.bindPopup(feature.properties.name);
            }
        });

        // Groupes pour les couches superposées
        var groupeEtage0 = L.layerGroup([sallesLayerEtage0, layerEtage0, cheminLayerEtage0]);
        var groupeEtage1 = L.layerGroup([sallesLayerEtage1, layerEtage1, cheminLayerEtage1]);

        // Ajout des groupes à la carte
        groupeEtage0.addTo(map);

        // Contrôle des couches
        var baseLayers = { "Carte OSM": osmLayer };
        var overlayLayers = { "Étage 0 (Rouge)": groupeEtage0, "Étage 1 (Bleu)": groupeEtage1 };
        L.control.layers(baseLayers, overlayLayers).addTo(map);

        function highlightSalleAndSetStartMarker(salleLayer, cheminLayer) {
            // Réinitialiser la couleur de toutes les salles
            sallesLayerEtage0.eachLayer(function (layer) {
                layer.setStyle({ color: "red" });
            });
            sallesLayerEtage1.eachLayer(function (layer) {
                layer.setStyle({ color: "blue" });
            });

            // Changer la couleur de la salle sélectionnée
            salleLayer.setStyle({ color: "pink" });

            // Trouver la forme chemin qui correspond au nom de la salle
            var cheminCorrespondant = cheminLayer.getLayers().find(layer => 
                layer.feature.properties.name.includes(salleLayer.feature.properties.name.split("_")[1])
            );

            if (cheminCorrespondant) {
                var cheminCoordinates = cheminCorrespondant.getLatLngs()[0];
                if (startMarker) {
                    startMarker.setLatLng(cheminCoordinates);
                } else {
                    startMarker = L.marker(cheminCoordinates).addTo(map).bindPopup("Point de départ").openPopup();
                }
                startPoint = [cheminCoordinates.lat, cheminCoordinates.lng];

                // Ajouter la barre de recherche pour le point d'arrivée après sélection du point de départ
                if (!map.hasLayer(searchControlEnd)) {
                    searchControlEnd.addTo(map);
                }

                // Vérifier si les deux points sont sélectionnés pour lancer le calcul d'itinéraire
                if (startPoint && endPoint) {
                    getRouteAndPoints(startPoint, endPoint);
                }
            }
        }

        var searchControlStart = new L.Control.Search({
            layer: sallesLayerEtage0,
            propertyName: 'name',
            marker: false,
            moveToLocation: function(latlng, title, map) {
                var feature = sallesLayerEtage0.getLayers().find(layer => layer.feature.properties.name === title);
                if (feature) {
                    highlightSalleAndSetStartMarker(feature, cheminLayerEtage0);
                    map.setView(latlng, 18);
                }
            }
        }).addTo(map);

        var searchControlEnd = new L.Control.Search({
            layer: sallesLayerEtage0,
            propertyName: 'name',
            marker: false,
            moveToLocation: function(latlng, title, map) {
                var feature = sallesLayerEtage0.getLayers().find(layer => layer.feature.properties.name === title);
                if (feature) {
                    endPoint = [latlng.lat, latlng.lng];
                    if (endMarker) {
                        endMarker.setLatLng(endPoint);
                    } else {
                        endMarker = L.marker(endPoint).addTo(map).bindPopup("Point d'arrivée").openPopup();
                    }
                    map.setView(endPoint, 18);
                    
                    // Vérifier si les deux points sont sélectionnés pour lancer le calcul d'itinéraire
                    if (startPoint && endPoint) {
                        getRouteAndPoints(startPoint, endPoint);
                    }
                }
            }
        });



        // Fonction pour calculer l'itinéraire
        function getRouteAndPoints(start, end) {
            var osrmUrl = `https://classefinder.duckdns.org/osrm/route/v1/foot/${start[1]},${start[0]};${end[1]},${end[0]}?steps=true&geometries=geojson&overview=full`;

            fetch(osrmUrl)
            .then(response => response.json())
            .then(data => {
                if (data.routes && data.routes.length > 0) {
                    var route = data.routes[0];
                    layerEtage0.clearLayers();
                    layerEtage1.clearLayers();
                    route.legs[0].steps.forEach((step, index) => {
                        var segment = {
                            type: "Feature",
                            geometry: { type: "LineString", coordinates: step.geometry.coordinates },
                            properties: { name: step.name || "" }
                        };
                        if (segment.properties.name.includes("0")) {
                            layerEtage0.addData(segment);
                        }
                        if (segment.properties.name.includes("1")) {
                            layerEtage1.addData(segment);
                        }
                    });
                    var bounds = L.geoJSON(route.geometry).getBounds();
                    map.fitBounds(bounds);
                }
            })
            .catch(error => console.error('Erreur lors de la récupération de l\'itinéraire:', error));
        }
    </script>
</body>
</html>
