<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte avec Leaflet et OSRM</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    <script src="https://unpkg.com/leaflet-search/dist/leaflet-search.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search/dist/leaflet-search.css" />
</head>
<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        // Initialisation de la carte Leaflet
        var map = L.map('map').setView([45.937486634251044, 6.132610739228446], 18); // Position initiale (Paris ici)

        // Ajouter une couche de fond à la carte (OpenStreetMap)
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // Variables pour stocker les points de départ et d'arrivée
        var startPoint = null;
        var endPoint = null;

        // Couches GeoJSON pour l'itinéraire avec styles personnalisés
        var layerEtage0 = L.geoJSON(null, {
            style: { color: "red", weight: 4 } // Style des segments "rue"
        });

        var layerEtage1 = L.geoJSON(null, {
            style: { color: "blue", weight: 4 } // Style des segments "route"
        });

        // Couches GeoJSON représentant les salles avec leurs chemins
        var sallesGeoJson = {
            "type": "FeatureCollection",
            "features": [
                {
                    "type": "Feature",
                    "geometry": {
                        "type": "LineString",
                        "coordinates": [
                            [6.1326, 45.9374],
                            [6.1330, 45.9378] // Coordonnées pour le chemin de la salle 115
                        ]
                    },
                    "properties": {
                        "name": "salle_115"
                    }
                },
                {
                    "type": "Feature",
                    "geometry": {
                        "type": "LineString",
                        "coordinates": [
                            [6.1325, 45.9375],
                            [6.1331, 45.9380] // Coordonnées pour le chemin de la salle 116
                        ]
                    },
                    "properties": {
                        "name": "salle_116"
                    }
                }
            ]
        };

        // Ajouter les salles GeoJSON à la carte
        var sallesLayer = L.geoJSON(sallesGeoJson, {
            onEachFeature: function (feature, layer) {
                layer.bindPopup(feature.properties.name);
            }
        }).addTo(map);

        // Ajouter Leaflet Search pour la recherche de salles
        var searchControl = new L.Control.Search({
            layer: sallesLayer,
            propertyName: 'name',
            marker: false,
            moveToLocation: function(latlng, title, map) {
                // Quand une salle est trouvée, le marqueur est placé et la carte centrée
                L.marker(latlng).addTo(map).bindPopup(title);
                map.setView(latlng, 18); // Zoom sur le point de la salle
            }
        }).addTo(map);

        // Contrôle des calques
        var baseLayers = {
            "Carte OSM": osmLayer
        };

        var overlayLayers = {
            "etage0 (Rouge)": layerEtage0,
            "etage1 (Bleu)": layerEtage1
        };

        L.control.layers(baseLayers, overlayLayers).addTo(map);

        // Fonction pour récupérer et filtrer les segments
        function getRouteAndPoints(start, end) {
            var osrmUrl = `https://classefinder.duckdns.org/osrm/route/v1/foot/${start[1]},${start[0]};${end[1]},${end[0]}?steps=true&geometries=geojson&overview=full`;

            fetch(osrmUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.routes && data.routes.length > 0) {
                        var route = data.routes[0];

                        // Nettoyer les anciennes données des couches
                        layerEtage0.clearLayers();
                        layerEtage1.clearLayers();

                        // Parcourir les étapes et construire les couches
                        route.legs[0].steps.forEach((step, index) => {
                            var startName = step.name || "";
                            var endName = (route.legs[0].steps[index + 1] || {}).name || "";
                            var segment = {
                                type: "Feature",
                                geometry: {
                                    type: "LineString",
                                    coordinates: step.geometry.coordinates
                                },
                                properties: {
                                    name: startName
                                }
                            };

                            // Ajouter le segment au calque correspondant
                            if (startName.toLowerCase().includes("0") || endName.toLowerCase().includes("0")) {
                                layerEtage0.addData(segment); // Ajouter uniquement les segments "rue"
                            }
                            if (startName.toLowerCase().includes("1") || endName.toLowerCase().includes("1")) {
                                layerEtage1.addData(segment); // Ajouter uniquement les segments "route"
                            }
                        });

                        // Centrer la carte sur l'itinéraire
                        var bounds = L.geoJSON(route.geometry).getBounds();
                        map.fitBounds(bounds);
                    }
                })
                .catch(error => {
                    console.error('Erreur lors de la récupération de l\'itinéraire:', error);
                });
        }

        // Gestion des clics sur la carte
        map.on('click', function(event) {
            // Si le point de départ n'est pas encore défini
            if (!startPoint) {
                startPoint = [event.latlng.lat, event.latlng.lng];
                L.marker(startPoint).addTo(map).bindPopup("Point de départ").openPopup();
            }
            // Si le point de départ est défini et que l'on clique pour définir un point d'arrivée
            else if (!endPoint) {
                endPoint = [event.latlng.lat, event.latlng.lng];
                L.marker(endPoint).addTo(map).bindPopup("Point d'arrivée").openPopup();

                // Appeler la fonction pour récupérer et afficher l'itinéraire
                getRouteAndPoints(startPoint, endPoint);
            }
            // Si les deux points sont déjà définis, réinitialiser pour choisir à nouveau
            else {
                startPoint = null;
                endPoint = null;
                map.eachLayer(function(layer) {
                    if (layer instanceof L.Marker) {
                        map.removeLayer(layer);
                    }
                });
                layerEtage0.clearLayers();
                layerEtage1.clearLayers();
            }
        });
    </script>
</body>
</html>
